name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  # workflow_dispatch:

permissions:
  contents: read
  id-token: write
  
jobs:
  test:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --immutable
      
      - name: Build all packages
        run: yarn build
      
      - name: Run linter
        run: yarn lint
      
      - name: Type check
        run: yarn typecheck
      
      - name: Run tests
        run: yarn test

  publish:
    name: Publish Packages
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version
      
      - name: Install dependencies
        run: yarn install --immutable
      
      - name: Build all packages
        run: yarn build

      - name: Publish packages (skip already-published versions)
        run: |
          set -euo pipefail

          publish_if_needed() {
            local package_dir="$1"
            local package_name="$2"
            local package_version

            package_version=$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('${package_dir}/package.json','utf8'));process.stdout.write(p.version);")

            echo "Checking ${package_name}@${package_version}"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version} (already exists on npm)"
            else
              echo "Publishing ${package_name}@${package_version}"
              (
                cd "${package_dir}"
                npm publish --provenance --access public
              )
            fi
          }

          publish_if_needed "packages/types" "@apiquest/types"
          publish_if_needed "packages/fracture" "@apiquest/fracture"
          publish_if_needed "packages/plugin-http" "@apiquest/plugin-http"
          publish_if_needed "packages/plugin-auth" "@apiquest/plugin-auth"
          publish_if_needed "packages/plugin-vault-file" "@apiquest/plugin-vault-file"
          publish_if_needed "packages/plugin-graphql" "@apiquest/plugin-graphql"
          publish_if_needed "packages/plugin-sse" "@apiquest/plugin-sse"
